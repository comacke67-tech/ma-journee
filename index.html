<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ma Journée</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#13121a; --bg2:#1e1d27; --bg3:#2a2936;
  --sep:rgba(255,255,255,0.07); --text:#ededf0;
  --sub:rgba(220,218,235,0.55); --hint:rgba(220,218,235,0.28);
  --green:#30d158; --orange:#ff9f0a; --red:#ff453a;
  --purple:#bf5af2; --blue:#0a84ff; --pink:#ff375f; --r:16px;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif; font-weight:300; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding-bottom:88px; }
.app { width:100%; max-width:390px; padding:0 16px; }

/* ── Switcher ── */
.profile-bar { position:sticky; top:0; z-index:200; background:rgba(19,18,26,0.94); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--sep); display:flex; justify-content:center; padding:env(safe-area-inset-top,16px) 16px 12px; width:100%; }
.profile-pill { display:flex; background:var(--bg2); border-radius:100px; padding:3px; gap:2px; border:1px solid var(--sep); }
.pbtn { padding:7px 28px; border-radius:100px; border:none; background:transparent; color:var(--hint); font-family:inherit; font-size:14px; cursor:pointer; transition:all 0.2s; }
.pbtn.on-coco { background:var(--blue); color:#fff; }
.pbtn.on-lili { background:var(--pink); color:#fff; }

/* ── Header ── */
header { padding:16px 0 4px; display:flex; align-items:center; justify-content:space-between; }
.hdate { font-size:13px; color:var(--hint); }
.hstreak { font-size:13px; color:var(--orange); }

/* ── Flash overlay ── */
.flash-overlay { position:fixed; inset:0; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; pointer-events:none; opacity:0; }
.flash-overlay.show { animation:flash-in-out 1.5s ease forwards; }
.flash-overlay.show-double { animation:flash-in-out 2s ease forwards; }
@keyframes flash-in-out { 0%{opacity:0;transform:scale(.8)} 25%{opacity:1;transform:scale(1)} 70%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.05)} }
.flash-checks { display:flex; gap:12px; }
.flash-check { width:64px; height:64px; border-radius:50%; background:var(--green); display:flex; align-items:center; justify-content:center; font-size:30px; color:#fff; box-shadow:0 0 40px rgba(48,209,88,.4); }
.flash-check.grey { background:var(--bg3); color:var(--hint); box-shadow:none; }
.flash-msg { font-size:20px; font-weight:300; color:var(--text); letter-spacing:-.3px; }

.sec { font-size:13px; color:var(--sub); padding:18px 4px 10px; }

/* ── Points ── */
.pts-wrap { background:var(--bg2); border-radius:var(--r); padding:16px 20px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
.pts-left { flex:1; margin-right:20px; }
.pts-lbl { font-size:13px; color:var(--sub); margin-bottom:2px; }
.pts-val { font-size:40px; font-weight:300; letter-spacing:-2px; line-height:1; }
.pts-val small { font-size:18px; color:var(--sub); font-weight:300; }
.pts-track { height:4px; background:var(--bg3); border-radius:2px; margin-top:10px; overflow:hidden; }
.pts-fill { height:100%; border-radius:2px; background:var(--blue); transition:width .4s cubic-bezier(.4,0,.2,1); }
.pts-right { text-align:right; }
.pts-rlbl { font-size:12px; color:var(--sub); }
.pts-rnum { font-size:24px; font-weight:300; letter-spacing:-.5px; }

/* ── Card / Row ── */
.card { background:var(--bg2); border-radius:var(--r); overflow:hidden; margin-bottom:12px; }
.row { display:flex; align-items:center; padding:0 16px; height:56px; border-bottom:1px solid var(--sep); }
.row:last-child { border-bottom:none; }
.row-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; margin-right:12px; flex-shrink:0; }
.row-lbl { flex:1; font-size:17px; font-weight:300; }
.scale { display:flex; gap:4px; flex-shrink:0; }
.sbtn { width:32px; height:32px; border-radius:8px; border:none; background:var(--bg3); color:var(--hint); font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s,transform .1s; }
.sbtn:active { transform:scale(.88); }
.app.is-coco .sbtn.on { background:rgba(10,132,255,.18); color:var(--blue); }
.app.is-lili .sbtn.on { background:rgba(255,55,95,.18);  color:var(--pink); }

/* ── Mood ── */
.mood-card { background:var(--bg2); border-radius:var(--r); padding:16px; margin-bottom:12px; }
.mood-top { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.mood-top .row-icon { margin:0; }
.mood-top .row-lbl { font-size:17px; font-weight:300; }
.mood-dots { display:flex; gap:8px; }
.mdot { flex:1; height:44px; border-radius:12px; background:var(--bg3); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:22px; position:relative; transition:transform .15s; }
.mdot:active { transform:scale(.93); }
.app.is-coco .mdot.on { background:rgba(10,132,255,.15); }
.app.is-coco .mdot.on::after { content:''; position:absolute; inset:0; border-radius:12px; border:1.5px solid var(--blue); }
.app.is-lili .mdot.on { background:rgba(255,55,95,.15); }
.app.is-lili .mdot.on::after { content:''; position:absolute; inset:0; border-radius:12px; border:1.5px solid var(--pink); }

/* ── Save btn ── */
.btn-save { width:100%; height:56px; background:var(--blue); color:#fff; border:none; border-radius:var(--r); font-size:17px; cursor:pointer; margin-top:8px; font-family:inherit; transition:opacity .15s,transform .15s; }
.btn-save:active { opacity:.8; transform:scale(.98); }
.btn-save.pink { background:var(--pink); }

/* ── Date nav ── */
.date-row { display:flex; align-items:center; justify-content:space-between; padding:18px 4px 10px; }
.date-row .sec { padding:0; }
.date-nav { display:flex; align-items:center; gap:6px; }
.date-nav button { width:28px; height:28px; border-radius:8px; border:none; background:var(--bg2); color:var(--sub); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; font-family:inherit; }
.date-nav button:active { background:var(--bg3); }
.date-nav button:disabled { opacity:.3; cursor:default; }
.date-nav-lbl { font-size:13px; color:var(--sub); min-width:70px; text-align:center; }

/* ── Tab bar ── */
.tab-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(19,18,26,0.94); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--sep); display:flex; justify-content:space-around; padding:8px 0 env(safe-area-inset-bottom,12px); z-index:100; }
.tbtn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:4px 16px; color:var(--hint); transition:color .15s; font-family:inherit; }
.tbtn.on { color:var(--blue); }
.tbtn.on.pink { color:var(--pink); }
.ticon { font-size:22px; }
.tlbl { font-size:10px; }

/* ── Views ── */
.view { display:none; }
.view.on { display:block; animation:up .25s ease; }
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ── Historique ── */
.scard { background:var(--bg2); border-radius:var(--r); padding:20px 16px; }
.slbl { font-size:13px; color:var(--sub); }
.cal { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:14px; }
.cday { aspect-ratio:1; border-radius:8px; background:var(--bg3); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:11px; color:var(--hint); gap:1px; }
.cday .sport-dot { font-size:24px; line-height:1; filter:drop-shadow(0 0 1.5px #000) drop-shadow(0 0 1px #000); }
.cday.ok { background:rgba(255,159,10,.2); color:var(--orange); }
.cday.great { background:rgba(48,209,88,.2); color:var(--green); }
.cday.sport-gold { background:linear-gradient(135deg,#b8860b,#ffd700,#b8860b); color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.4); }
.cday.today { outline:1.5px solid var(--blue); outline-offset:1px; }
.cday.today.pink { outline-color:var(--pink); }

/* ── Graph view ── */
.graph-header { display:flex; align-items:center; justify-content:space-between; padding:16px 0 4px; }
.graph-title { font-size:13px; color:var(--hint); }
.gear-btn { width:32px; height:32px; border-radius:10px; border:none; background:var(--bg2); color:var(--sub); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.gear-btn:active { background:var(--bg3); }

/* Days panel */
.days-panel { background:var(--bg2); border-radius:12px; padding:14px 16px; margin-bottom:16px; display:none; }
.days-panel.open { display:block; }
.days-panel-lbl { font-size:12px; color:var(--sub); margin-bottom:10px; }
.days-btns { display:flex; gap:8px; flex-wrap:wrap; }
.days-btn { padding:6px 14px; border-radius:100px; border:none; background:var(--bg3); color:var(--hint); font-size:13px; cursor:pointer; font-family:inherit; transition:all .15s; }
.days-btn.on { background:var(--blue); color:#fff; }
.days-input-row { display:flex; align-items:center; gap:10px; margin-top:10px; }
.days-input-row input { width:70px; background:var(--bg3); border:1px solid var(--sep); border-radius:8px; padding:6px 10px; color:var(--text); font-size:14px; font-family:inherit; outline:none; text-align:center; }
.days-input-row span { font-size:13px; color:var(--sub); }

/* Bubbles */
.bubble-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.bubble { padding:7px 18px; border-radius:100px; border:1px solid var(--sep); background:var(--bg2); color:var(--hint); font-size:14px; cursor:pointer; font-family:inherit; transition:all .15s; }
.bubble:active { opacity:.7; }
.bubble.on-coco { background:var(--blue); color:#fff; border-color:var(--blue); }
.bubble.on-lili { background:var(--pink); color:#fff; border-color:var(--pink); }
.bubble.on-theme { background:var(--bg3); color:var(--text); border-color:rgba(255,255,255,.2); }

/* SVG Chart */
.chart-wrap { background:var(--bg2); border-radius:var(--r); padding:16px 12px 12px; margin-bottom:12px; position:relative; min-height:280px; }
.chart-empty { display:none; align-items:center; justify-content:center; height:280px; font-size:14px; color:var(--hint); }
.filters-wrap { background:var(--bg2); border-radius:var(--r); padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.filter-row { display:flex; gap:8px; align-items:center; }

/* Legend */

.app { transition:opacity .15s; }
.app.fading { opacity:0; pointer-events:none; }
/* ── DB Viewer ── */
.db-gear { position:absolute; right:16px; top:50%; transform:translateY(-50%); width:28px; height:28px; border-radius:8px; border:none; background:transparent; color:rgba(255,255,255,.25); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:color .15s; font-family:inherit; }
.db-gear:hover { color:rgba(255,255,255,.5); }
.db-overlay { position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.7); backdrop-filter:blur(8px); display:none; flex-direction:column; }
.db-overlay.open { display:flex; }
.db-sheet { background:var(--bg2); border-radius:20px 20px 0 0; margin-top:auto; max-height:85vh; display:flex; flex-direction:column; }
.db-sheet-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; border-bottom:1px solid var(--sep); flex-shrink:0; }
.db-sheet-title { font-size:15px; font-weight:400; }
.db-close { background:var(--bg3); border:none; color:var(--sub); width:28px; height:28px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:inherit; }
.db-content { overflow-y:auto; padding:16px 20px 32px; flex:1; }
.db-profile-block { margin-bottom:24px; }
.db-profile-title { font-size:13px; font-weight:500; color:var(--sub); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
.db-entry { background:var(--bg3); border-radius:10px; padding:10px 12px; margin-bottom:6px; font-size:12px; font-family:monospace; color:var(--sub); line-height:1.6; word-break:break-all; }
.db-entry .db-date { font-size:13px; font-weight:500; color:var(--text); font-family:-apple-system,sans-serif; margin-bottom:4px; }
.db-entry .db-fields { display:flex; flex-wrap:wrap; gap:6px; }
.db-field { background:var(--bg2); border-radius:6px; padding:2px 8px; font-size:11px; font-family:-apple-system,sans-serif; color:var(--sub); }
.db-field b { color:var(--text); font-weight:400; }
.db-empty { color:var(--hint); font-size:14px; padding:16px 0; }
.db-stats-row { display:flex; gap:8px; margin-bottom:16px; }
.db-stat { background:var(--bg3); border-radius:10px; padding:10px 14px; flex:1; }
.db-stat-n { font-size:22px; font-weight:300; letter-spacing:-0.5px; }
.db-stat-l { font-size:11px; color:var(--sub); margin-top:2px; }
.edit-hint { display:none; text-align:center; padding:10px 0 4px; font-size:13px; color:var(--hint); }
</style>
</head>
<body>

<div class="profile-bar" style="position:relative;">
  <div class="profile-pill">
    <button class="pbtn on-coco" id="pbtn-coco" onclick="switchProfile('coco')">Coco</button>
    <button class="pbtn"         id="pbtn-lili" onclick="switchProfile('lili')">Lili</button>
  </div>
  <button class="db-gear" onclick="openDB()" title="Base de données">⚙</button>
</div>

<div class="app is-coco" id="app">

  <!-- CHECK-IN -->
  <div class="view on" id="view-checkin">
    <header>
      <div class="hdate" id="hdr-date"></div>
      <div class="hstreak">🔥 <span id="streak-n">0</span></div>
    </header>
    <div id="form-area">
      <div class="date-row">
        <div class="sec" id="date-lbl">Aujourd'hui</div>
        <div class="date-nav">
          <button onclick="shiftDate(-1)" id="btn-prev">‹</button>
          <div class="date-nav-lbl" id="date-nav-lbl">auj.</div>
          <button onclick="shiftDate(1)" id="btn-next" disabled>›</button>
        </div>
      </div>
      <div class="pts-wrap">
        <div class="pts-left">
          <div class="pts-lbl">Points aujourd'hui</div>
          <div class="pts-val"><span id="pts-now">0</span> <small>/ 15</small></div>
          <div class="pts-track"><div class="pts-fill" id="pts-fill" style="width:0%"></div></div>
        </div>
        <div class="pts-right">
          <div class="pts-rlbl">Total</div>
          <div class="pts-rnum" id="pts-total">0</div>
        </div>
      </div>
      <div class="card">
        <div class="row">
          <div class="row-icon" style="background:rgba(48,209,88,.15)">🏃</div>
          <div class="row-lbl">Sport</div>
          <div class="scale" id="sc-sport">
            <button class="sbtn pos lvl-1" onclick="setScale('sport',1)">1</button>
            <button class="sbtn pos lvl-2" onclick="setScale('sport',2)">2</button>
            <button class="sbtn pos lvl-3" onclick="setScale('sport',3)">3</button>
          </div>
        </div>
        <div class="row">
          <div class="row-icon" style="background:rgba(255,159,10,.15)">🥗</div>
          <div class="row-lbl">Alimentation</div>
          <div class="scale" id="sc-meals">
            <button class="sbtn pos lvl-1" onclick="setScale('meals',1)">1</button>
            <button class="sbtn pos lvl-2" onclick="setScale('meals',2)">2</button>
            <button class="sbtn pos lvl-3" onclick="setScale('meals',3)">3</button>
          </div>
        </div>
        <div class="row">
          <div class="row-icon" style="background:rgba(94,92,230,.15)">🌙</div>
          <div class="row-lbl">Sommeil</div>
          <div class="scale" id="sc-sleep">
            <button class="sbtn pos lvl-1" onclick="setScale('sleep',1)">1</button>
            <button class="sbtn pos lvl-2" onclick="setScale('sleep',2)">2</button>
            <button class="sbtn pos lvl-3" onclick="setScale('sleep',3)">3</button>
          </div>
        </div>
        <div class="row">
          <div class="row-icon" style="background:rgba(255,69,58,.12)">😤</div>
          <div class="row-lbl">Stress</div>
          <div class="scale" id="sc-stress">
            <button class="sbtn pos lvl-1" onclick="setScale('stress',1)">1</button>
            <button class="sbtn pos lvl-2" onclick="setScale('stress',2)">2</button>
            <button class="sbtn pos lvl-3" onclick="setScale('stress',3)">3</button>
          </div>
        </div>
      </div>
      <div class="mood-card">
        <div class="mood-top">
          <div class="row-icon" style="background:rgba(191,90,242,.15)">😌</div>
          <div class="row-lbl">Humeur</div>
        </div>
        <div class="mood-dots">
          <button class="mdot" data-v="1" onclick="setMood(1)">😞</button>
          <button class="mdot" data-v="2" onclick="setMood(2)">😕</button>
          <button class="mdot" data-v="3" onclick="setMood(3)">😐</button>
          <button class="mdot" data-v="4" onclick="setMood(4)">🙂</button>
          <button class="mdot" data-v="5" onclick="setMood(5)">😄</button>
        </div>
      </div>
      <button class="btn-save" id="btn-save" onclick="save()">Enregistrer</button>
      <div class="edit-hint" id="edit-hint">Modifie et enregistre à nouveau</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="view" id="view-stats">
    <header><div class="hdate">30 derniers jours</div></header>
    <div class="scard" style="margin-bottom:12px">
      <div class="slbl">Activité — 30 jours</div>
      <div class="cal" id="cal-grid"></div>
    </div>
  </div>

  <!-- GRAPH -->
  <div class="view" id="view-graph">
    <div class="graph-header">
      <div class="graph-title" id="graph-title">10 derniers jours</div>
      <button class="gear-btn" onclick="toggleDaysPanel()" title="Paramètres">⚙</button>
    </div>

    <!-- Days panel (gear) -->
    <div class="days-panel" id="days-panel">
      <div class="days-panel-lbl">Période affichée</div>
      <div class="days-btns">
        <button class="days-btn" data-d="7"  onclick="setDays(7)">7j</button>
        <button class="days-btn on" data-d="10" onclick="setDays(10)">10j</button>
        <button class="days-btn" data-d="14" onclick="setDays(14)">14j</button>
        <button class="days-btn" data-d="30" onclick="setDays(30)">30j</button>
      </div>
      <div class="days-input-row">
        <input type="number" id="days-custom" min="1" max="90" placeholder="—" oninput="setCustomDays(this.value)">
        <span>jours personnalisé</span>
      </div>
    </div>

    <!-- Chart FIRST, big -->
    <div class="chart-wrap">
      <div class="chart-empty" id="chart-empty">Pas encore de données</div>
      <div id="chart-svg-wrap"></div>
    </div>

    <!-- Filters BELOW chart -->
    <div class="filters-wrap">
      <div class="filter-row">
        <button class="bubble on-coco" id="gb-coco" onclick="toggleGP('coco')">Coco</button>
        <button class="bubble on-lili" id="gb-lili" onclick="toggleGP('lili')">Lili</button>
      </div>
      <div class="filter-row" style="flex-wrap:wrap;">
        <button class="bubble on-theme" data-k="sport"  onclick="setTheme('sport')">🏃 Sport</button>
        <button class="bubble"          data-k="meals"  onclick="setTheme('meals')">🥗 Repas</button>
        <button class="bubble"          data-k="sleep"  onclick="setTheme('sleep')">🌙 Sommeil</button>
        <button class="bubble"          data-k="stress" onclick="setTheme('stress')">😤 Stress</button>
        <button class="bubble"          data-k="mood"   onclick="setTheme('mood')">😌 Humeur</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<nav class="tab-bar">
  <button class="tbtn on" id="tab-checkin" onclick="switchTab('checkin')">
    <div class="ticon">⊕</div><div class="tlbl">Check-in</div>
  </button>
  <button class="tbtn" id="tab-stats" onclick="switchTab('stats')">
    <div class="ticon">◎</div><div class="tlbl">Historique</div>
  </button>
  <button class="tbtn" id="tab-graph" onclick="switchTab('graph')">
    <div class="ticon">〜</div><div class="tlbl">Graphe</div>
  </button>
</nav>

<!-- DB Viewer overlay -->
<div class="db-overlay" id="db-overlay" onclick="closeDBIfBg(event)">
  <div class="db-sheet" id="db-sheet">
    <div class="db-sheet-header">
      <div class="db-sheet-title">Base de données</div>
      <button class="db-close" onclick="closeDB()">✕</button>
    </div>
    <div class="db-content" id="db-content"></div>
  </div>
</div>

<!-- Flash overlay -->
<div class="flash-overlay" id="flash-overlay">
  <div class="flash-checks" id="flash-checks"><div class="flash-check">✓</div></div>
  <div class="flash-msg" id="flash-msg"></div>
</div>

<script>
// ══════════════════════════════════════════
//  DB  mj_coco / mj_lili
//  { date, sport, meals, sleep, stress, mood, points, ts }
// ══════════════════════════════════════════
let P = localStorage.getItem('mj_profile') || 'coco';
const dbKey      = () => 'mj_' + P;
const getDB      = () => { try { return JSON.parse(localStorage.getItem(dbKey())) || []; } catch { return []; } };
const saveDB     = a  => localStorage.setItem(dbKey(), JSON.stringify(a));
const getDBFor   = p  => { try { return JSON.parse(localStorage.getItem('mj_'+p)) || []; } catch { return []; } };
const todayStr   = () => new Date().toISOString().slice(0,10);
let selectedDate = todayStr();
const dateKey    = () => selectedDate;
const todayEntry = () => getDB().find(e => e.date === selectedDate);

function calcPoints(s) {
  let p = (s.sport||0)+(s.meals||0)+(s.sleep||0)+(s.stress||0);
  const m=s.mood||0;
  if(m>=4)p+=3; else if(m===3)p+=2; else if(m>=1)p+=1;
  return p;
}
const MAX=15;

let S={sport:0,meals:0,sleep:0,stress:0,mood:0};

function resetForm(){
  S={sport:0,meals:0,sleep:0,stress:0,mood:0};
  ['sport','meals','sleep','stress'].forEach(k=>
    document.querySelectorAll('#sc-'+k+' .sbtn').forEach(b=>b.classList.remove('on'))
  );
  document.querySelectorAll('.mdot').forEach(d=>d.classList.remove('on'));
  document.getElementById('edit-hint').style.display='none';
  document.getElementById('btn-save').textContent='Enregistrer';
}

function prefillForm(e){
  S={sport:e.sport||0,meals:e.meals||0,sleep:e.sleep||0,stress:e.stress||0,mood:e.mood||0};
  ['sport','meals','sleep','stress'].forEach(k=>{
    document.querySelectorAll('#sc-'+k+' .sbtn').forEach(b=>
      b.classList.toggle('on',parseInt(b.textContent)===S[k])
    );
  });
  document.querySelectorAll('.mdot').forEach(d=>d.classList.toggle('on',+d.dataset.v===S.mood));
  document.getElementById('edit-hint').style.display='block';
  document.getElementById('btn-save').textContent='Modifier';
}

function setScale(k,v){
  S[k]=S[k]===v?0:v;
  document.querySelectorAll('#sc-'+k+' .sbtn').forEach(b=>
    b.classList.toggle('on',parseInt(b.textContent)===S[k])
  );
  refreshPts();
}

function setMood(v){
  S.mood=v;
  document.querySelectorAll('.mdot').forEach(d=>d.classList.toggle('on',+d.dataset.v===v));
  refreshPts();
}

function refreshPts(){
  const pts=calcPoints(S);
  const total=getDB().reduce((s,e)=>s+(e.points||0),0);
  const isPink=P==='lili';
  const ac=isPink?'var(--pink)':'var(--blue)';
  document.getElementById('pts-now').textContent=pts;
  document.getElementById('pts-total').textContent=total;
  document.getElementById('pts-total').style.color=ac;
  const fill=document.getElementById('pts-fill');
  fill.style.width=Math.min(100,pts/MAX*100)+'%';
  fill.style.background=pts>=12?'var(--green)':pts>=7?'var(--orange)':ac;
}

function save(){
  const arr=getDB().filter(e=>e.date!==selectedDate);
  const pts=calcPoints(S);
  arr.push({date:selectedDate,sport:S.sport,meals:S.meals,sleep:S.sleep,stress:S.stress,mood:S.mood,points:pts,ts:Date.now()});
  arr.sort((a,b)=>b.date.localeCompare(a.date));
  saveDB(arr);
  if(navigator.vibrate)navigator.vibrate(10);
  refreshStreak();refreshPts();
  const other=P==='coco'?'lili':'coco';
  const otherDone=getDBFor(other).some(e=>e.date===selectedDate);
  // Trigger weekly mail on Sunday when both profiles done
  const isSunday = new Date(selectedDate+'T12:00:00').getDay()===0;
  if(otherDone){
    showFlash(true,'À demain !',()=>{
      selectedDate=todayStr();
      renderCheckinView();
      if(isSunday) setTimeout(sendWeeklyMail, 400);
    });
  } else {
    showFlash(false,'',()=>{switchProfile(other);});
  }
}

function sendWeeklyMail(){
  const DEST='comacke67@gmail.com';
  const me=['','😞','😕','😐','🙂','😄'];
  const fmtDate=d=>{const[,m,day]=d.split('-');const n=['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];return parseInt(day)+' '+n[parseInt(m)-1];};
  const fmtEntry=e=>{
    const parts=[];
    if(e.sport >0) parts.push('Sport: '+e.sport+'/3');
    if(e.meals >0) parts.push('Repas: '+e.meals+'/3');
    if(e.sleep >0) parts.push('Sommeil: '+e.sleep+'/3');
    if(e.stress>0) parts.push('Stress: '+e.stress+'/3');
    if(e.mood  >0) parts.push('Humeur: '+me[e.mood]);
    return fmtDate(e.date)+' — '+parts.join(', ')+' ('+e.points+' pts)';
  };
  let body='Récap de la semaine — Ma Journée\n\n';
  ['coco','lili'].forEach(pr=>{
    const db=getDBFor(pr);
    const name=pr==='coco'?'Coco':'Lili';
    // Last 7 entries
    const week=db.slice(0,7).reverse();
    const totalWeek=week.reduce((s,e)=>s+(e.points||0),0);
    body+=name.toUpperCase()+'\n';
    if(!week.length){body+='Aucune entrée cette semaine.\n';}
    else{week.forEach(e=>{body+=fmtEntry(e)+'\n';});}
    body+='Total semaine : '+totalWeek+' pts\n\n';
  });
  const subject=encodeURIComponent('Ma Journée — Récap semaine du '+fmtDate(new Date().toISOString().slice(0,10)));
  const encodedBody=encodeURIComponent(body);
  window.location.href='mailto:'+DEST+'?subject='+subject+'&body='+encodedBody;
}

function showFlash(double,msg,callback){
  const overlay=document.getElementById('flash-overlay');
  const checks=document.getElementById('flash-checks');
  const msgEl=document.getElementById('flash-msg');
  checks.innerHTML=double
    ?'<div class="flash-check">✓</div><div class="flash-check">✓</div>'
    :'<div class="flash-check">✓</div><div class="flash-check grey">✓</div>';
  msgEl.textContent=msg;
  overlay.className='flash-overlay '+(double?'show-double':'show');
  setTimeout(()=>{overlay.className='flash-overlay';if(callback)callback();},double?2000:1500);
}

function computeStreak(){
  const set=new Set(getDB().map(e=>e.date));
  const today=dateKey();let n=0;const d=new Date();
  if(!set.has(today))d.setDate(d.getDate()-1);
  while(true){const k=d.toISOString().slice(0,10);if(set.has(k)){n++;d.setDate(d.getDate()-1);}else break;}
  return n;
}
function refreshStreak(){document.getElementById('streak-n').textContent=computeStreak();}

function renderStats(){
  const all=getDB();
  const isPink=P==='lili';
  const cal=document.getElementById('cal-grid');cal.innerHTML='';
  const map=new Map(all.map(e=>[e.date,e])),ts=dateKey();
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10),e=map.get(k);
    const el=document.createElement('div');
    el.className='cday';el.textContent=d.getDate();
    if(k===ts){el.classList.add('today');if(isPink)el.classList.add('pink');}
    if(e){
      const pts=e.points||0;
      if(pts>=12)el.classList.add('great');
      else if(pts>=6)el.classList.add('ok');
      else{el.style.background='rgba(255,255,255,.04)';el.style.color='var(--hint)';}
      el.title=pts+' pts';
      if((e.sport||0)>=2){
        const ic=document.createElement('span');ic.className='sport-dot';ic.textContent='🏃';
        el.appendChild(ic);el.classList.add('sport-gold');
      }
    }
    cal.appendChild(el);
  }
}

function openDB(){
  renderDB();
  document.getElementById('db-overlay').classList.add('open');
}
function closeDB(){ document.getElementById('db-overlay').classList.remove('open'); }
function closeDBIfBg(e){ if(e.target===document.getElementById('db-overlay'))closeDB(); }

function renderDB(){
  const el=document.getElementById('db-content');
  const me=['','😞','😕','😐','🙂','😄'];
  const fmt=d=>{const[,m,day]=d.split('-');const n=['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];return parseInt(day)+' '+n[parseInt(m)-1];};
  let html='';
  ['coco','lili'].forEach(pr=>{
    const db=getDBFor(pr);
    const name=pr==='coco'?'Coco':'Lili';
    const ac=pr==='coco'?'var(--blue)':'var(--pink)';
    const totalPts=db.reduce((s,e)=>s+(e.points||0),0);
    const set=new Set(db.map(e=>e.date));
    let streak=0,dd=new Date();
    if(!set.has(todayStr()))dd.setDate(dd.getDate()-1);
    while(true){const k=dd.toISOString().slice(0,10);if(set.has(k)){streak++;dd.setDate(dd.getDate()-1);}else break;}
    html+=`<div class="db-profile-block">
      <div class="db-profile-title" style="color:${ac}">${name} — ${db.length} entrée${db.length>1?'s':''}</div>
      <div class="db-stats-row">
        <div class="db-stat"><div class="db-stat-n" style="color:${ac}">${totalPts}</div><div class="db-stat-l">pts total</div></div>
        <div class="db-stat"><div class="db-stat-n" style="color:var(--orange)">${streak}</div><div class="db-stat-l">streak</div></div>
        <div class="db-stat"><div class="db-stat-n">${db.length}</div><div class="db-stat-l">entrées</div></div>
      </div>`;
    if(!db.length){html+='<div class="db-empty">Aucune entrée.</div>';}
    else{db.slice(0,30).forEach(e=>{
      const f=[
        e.sport >0?`<span class="db-field"><b>sport</b> ${e.sport}/3</span>`:'',
        e.meals >0?`<span class="db-field"><b>repas</b> ${e.meals}/3</span>`:'',
        e.sleep >0?`<span class="db-field"><b>sommeil</b> ${e.sleep}/3</span>`:'',
        e.stress>0?`<span class="db-field"><b>stress</b> ${e.stress}/3</span>`:'',
        e.mood  >0?`<span class="db-field"><b>humeur</b> ${me[e.mood]}</span>`:'',
        e.points!=null?`<span class="db-field" style="color:${ac}"><b>⭐</b> ${e.points}pts</span>`:''
      ].filter(Boolean).join('');
      html+=`<div class="db-entry"><div class="db-date">${fmt(e.date)}</div><div class="db-fields">${f}</div></div>`;
    });}
    html+='</div>';
  });
  el.innerHTML=html;
}

// ── Date nav ──
function shiftDate(delta){
  const d=new Date(selectedDate+'T12:00:00');
  d.setDate(d.getDate()+delta);
  const nd=d.toISOString().slice(0,10);
  if(nd>todayStr())return;
  selectedDate=nd;updateDateNav();resetForm();renderCheckinView();
}
function updateDateNav(){
  const today=todayStr(),isToday=selectedDate===today;
  if(isToday){
    document.getElementById('date-lbl').textContent="Aujourd'hui";
  } else {
    const[,m,day]=selectedDate.split('-');
    const names=['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'];
    document.getElementById('date-lbl').textContent=parseInt(day)+' '+names[parseInt(m)-1];
  }
  document.getElementById('date-nav-lbl').textContent=isToday?'auj.':selectedDate.slice(8)+'/'+selectedDate.slice(5,7);
  document.getElementById('btn-next').disabled=isToday;
}

// ── Graph state ──
let gDays=10;
let gProfiles={coco:true,lili:true};
let gTheme='sport';

function toggleDaysPanel(){
  document.getElementById('days-panel').classList.toggle('open');
}
function setDays(d){
  gDays=d;
  document.querySelectorAll('.days-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.d)===d));
  document.getElementById('days-custom').value='';
  document.getElementById('graph-title').textContent=d+' derniers jours';
  renderGraph();
}
function setCustomDays(v){
  const n=parseInt(v);
  if(!n||n<1||n>365)return;
  gDays=n;
  document.querySelectorAll('.days-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('graph-title').textContent=n+' derniers jours';
  renderGraph();
}
function toggleGP(p){
  const active=Object.values(gProfiles).filter(Boolean).length;
  if(gProfiles[p]&&active===1)return;
  gProfiles[p]=!gProfiles[p];
  const btn=document.getElementById('gb-'+p);
  btn.className='bubble'+(gProfiles[p]?(' on-'+p):'');
  renderGraph();
}
function setTheme(k){
  gTheme=k;
  document.querySelectorAll('.bubble[data-k]').forEach(b=>
    b.classList.toggle('on-theme',b.dataset.k===k)
  );
  renderGraph();
}

// ── SVG Line Chart ──
function renderGraph(){
  const wrap=document.getElementById('chart-svg-wrap');
  const emptyEl=document.getElementById('chart-empty');
  if(!wrap)return;

  // Build dates
  const dates=[],labels=[];
  for(let i=gDays-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    dates.push(d.toISOString().slice(0,10));
    const day=d.getDate(),mo=d.getMonth()+1;
    labels.push(day+'/'+(mo<10?'0'+mo:mo));
  }

  const themeMax=gTheme==='mood'?5:3;
  const profileColors={coco:'#0a84ff',lili:'#ff375f'};
  const series=[];

  ['coco','lili'].forEach(pr=>{
    if(!gProfiles[pr])return;
    const db=getDBFor(pr);
    const map=new Map(db.map(e=>[e.date,e]));
    const vals=dates.map(d=>{const e=map.get(d);return(e&&(e[gTheme]||0)>0)?e[gTheme]:null;});
    series.push({name:pr==='coco'?'Coco':'Lili',color:profileColors[pr],vals});
  });

  const hasData=series.some(s=>s.vals.some(v=>v!==null));
  emptyEl.style.display=hasData?'none':'flex';
  if(!hasData){wrap.innerHTML='';return;}

  // Dimensions
  const W=wrap.parentElement.clientWidth-24||320;
  const H=260;
  const padL=24,padR=12,padT=12,padB=28;
  const chartW=W-padL-padR;
  const chartH=H-padT-padB;
  const n=dates.length;
  const xStep=n>1?chartW/(n-1):chartW/2;

  const toX=i=>padL+i*xStep;
  const toY=v=>padT+chartH-(v/themeMax)*chartH;

  let html=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`;

  // Grid lines Y
  for(let v=0;v<=themeMax;v++){
    const y=toY(v);
    html+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
    if(v>0)html+=`<text x="${padL-4}" y="${y+4}" fill="rgba(220,218,235,.3)" font-size="9" text-anchor="end" font-family="-apple-system,sans-serif">${v}</text>`;
  }

  // X labels (show every N to avoid crowding)
  const step=Math.max(1,Math.ceil(n/8));
  labels.forEach((lbl,i)=>{
    if(i%step!==0&&i!==n-1)return;
    html+=`<text x="${toX(i)}" y="${H-6}" fill="rgba(220,218,235,.35)" font-size="9" text-anchor="middle" font-family="-apple-system,sans-serif">${lbl}</text>`;
  });

  // Lines + dots per series
  series.forEach(s=>{
    // Area fill
    let areaPoints='';
    const segments=[];
    let seg=[];
    s.vals.forEach((v,i)=>{
      if(v!==null){seg.push({i,v});}
      else{if(seg.length>1)segments.push(seg);else if(seg.length===1)segments.push(seg);seg=[];}
    });
    if(seg.length)segments.push(seg);

    segments.forEach(seg=>{
      if(seg.length<2)return;
      let d=`M ${toX(seg[0].i)} ${toY(seg[0].v)}`;
      for(let j=1;j<seg.length;j++){
        const cx=(toX(seg[j-1].i)+toX(seg[j].i))/2;
        d+=` C ${cx} ${toY(seg[j-1].v)}, ${cx} ${toY(seg[j].v)}, ${toX(seg[j].i)} ${toY(seg[j].v)}`;
      }
      const aFill=d+` L ${toX(seg[seg.length-1].i)} ${H-padB} L ${toX(seg[0].i)} ${H-padB} Z`;
      html+=`<path d="${aFill}" fill="${s.color}" fill-opacity=".08"/>`;
      html+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    });

    // Dots
    s.vals.forEach((v,i)=>{
      if(v===null)return;
      html+=`<circle cx="${toX(i)}" cy="${toY(v)}" r="3.5" fill="${s.color}"/>`;
    });
  });

  html+='</svg>';
  wrap.innerHTML=html;

}


// ── Tabs ──
let tab='checkin';
function switchTab(t){
  tab=t;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on','pink'));
  document.getElementById('view-'+t).classList.add('on');
  const btn=document.getElementById('tab-'+t);btn.classList.add('on');
  if(P==='lili')btn.classList.add('pink');
  if(t==='stats')renderStats();
  if(t==='graph')setTimeout(renderGraph,50);
}

function switchProfile(p){
  if(p===P)return;
  const app=document.getElementById('app');app.classList.add('fading');
  setTimeout(()=>{
    P=p;localStorage.setItem('mj_profile',p);
    selectedDate=todayStr();applyTheme();resetForm();renderCheckinView();
    if(tab==='stats')renderStats();
    if(tab==='graph')renderGraph();
    app.classList.remove('fading');
  },150);
}

function applyTheme(){
  const isPink=P==='lili';
  const app=document.getElementById('app');
  app.classList.toggle('is-coco',!isPink);
  app.classList.toggle('is-lili',isPink);
  document.getElementById('pbtn-coco').className='pbtn'+(P==='coco'?' on-coco':'');
  document.getElementById('pbtn-lili').className='pbtn'+(P==='lili'?' on-lili':'');
  document.getElementById('btn-save').className='btn-save'+(isPink?' pink':'');
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on','pink'));
  const tb=document.getElementById('tab-'+tab);tb.classList.add('on');if(isPink)tb.classList.add('pink');
  refreshPts();
}

function renderCheckinView(){
  updateDateNav();
  const e=todayEntry();
  document.getElementById('form-area').style.display='block';
  if(e){prefillForm(e);}else{resetForm();}
  refreshStreak();refreshPts();
}

(function init(){
  const now=new Date();
  const j=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const m=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('hdr-date').textContent=j[now.getDay()]+' '+now.getDate()+' '+m[now.getMonth()];
  applyTheme();renderCheckinView();
})();
</script>
